<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaffa</title>
  <style>
    * {
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      padding-bottom: 10px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      padding: 15px;
      width: 100%;
      border-bottom: 1px solid black;
      font-size: 13pt;
    }

    a {
      color: black;
    }

    img {
      width: 85vh;
      height: auto;
      display: block;
      margin: 40px auto;
      filter: drop-shadow(1px 3px 4px #00000078);
    }

    .container-category,
    .container-name {
      display: grid;
      grid-template-columns: .8fr 1fr 1fr 1fr;
    }

    .container {
      margin-top: auto;
      padding: 20px;
    }

    .name {
      font-size: 13pt;
      text-transform: uppercase;
    }

    .category {
      font-size: 13pt !important;
    }

    .back {
      top: 10px;
      text-decoration: none;
    }

    .line {
      border-top: 1px solid black;
      z-index: 2;
      top: 10px;
    }

    .main-content {
      position: relative;
      z-index: 1;
    }

    @media screen and (max-width: 600px) {

      .category,
      .name {
        font-size: 13px !important;
      }

      header {
        font-size: 10px;
      }

      .back {
        font-size: 13px;
      }

      img {
        margin-top: 40px;
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="main-content">
    <header>
      <div>
        <a href="../index.html" class="back">← Back</a>
      </div>
    </header>

    <div class="background">
      <img src="1 - Jaffa Red Pomelo- Palestinian Colors.png" alt="jaffa">
    </div>
  </div>

  <div class="container">
    <div class="line"></div>

    <div class="container-category">
      <div class="category">PLU</div>
      <div class="category">Fruit Kind</div>
      <div class="category">Country of Origin</div>
      <div class="category">Brand</div>
    </div>

    <div class="line"></div>

    <div class="container-name">
      <div class="name">#3129</div>
      <div class="name">Red Pomelo</div>
      <div class="name">Israel</div>
      <div class="name">Jaffa</div>
    </div>

    <div class="line"></div>
  </div>

</body>

</html>
