<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Fruit Sticker Archive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <style>
    * {
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      padding: 15px;
      width: 100%;
      border-bottom: 1px solid black;
      font-size: 13pt;
      align-items: center;
      background-color: white;
    }

    header a {
      justify-self: end;
    }

    body {
      overflow-x: hidden;
    }

    .box {
      display: none;
    }

    .show {
      display: block;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    .dropdown-container {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      padding: 10px;
    }

    .dropbtn {
      border: 1px solid black;
      background-color: white;
      padding: 5px;
      cursor: pointer;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: white;
      min-width: 100px;
      z-index: 1;
    }

    .dropdown-content a {
      padding: 10px;
      display: block;
      cursor: pointer;
    }

    .dropdown-content a:hover {
      background-color: #e7e7e7;
    }

    .dropdown:active .dropdown-content {
      display: block;
    }

    .stickers {
      position: relative;
      width: 100%;
      min-height: 80vh;
    }

    .randomImage {
      position: absolute;
      z-index: 2;
    }

    .randomImage img {
      max-height: 200px;
    }

    .randomImage:hover {
      transform: rotate(0deg) scale(1.05) !important;
      transition: 0.25s ease-in-out;
    }

    @media screen and (max-width: 600px) {

      .stickers {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 20px;
      }

      .randomImage {
        position: static;
        transform: none !important;
      }

      .randomImage img {
        max-width: 250px;
        width: 100%;
        height: auto;
      }
    }
  </style>

  <header>
    <div>Fruit Sticker Archive</div>
    <a href="about/about.html">About</a>
  </header>

  <div class="dropdown-container">

    <div class="dropdown">
      <button class="dropbtn">Fruit Kind</button>
      <div class="dropdown-content">
        <a onclick="filterObjects('avocado')">Avocado</a>
        <a onclick="filterObjects('banana')">Banana</a>
        <a onclick="filterObjects('citrus')">Citrus</a>
        <a onclick="filterObjects('all')">Show All</a>
      </div>
    </div>

    <div class="dropdown">
      <button class="dropbtn">Country</button>
      <div class="dropdown-content">
        <a onclick="filterObjects('canada')">Canada</a>
        <a onclick="filterObjects('mexico')">Mexico</a>
        <a onclick="filterObjects('usa')">USA</a>
        <a onclick="filterObjects('costa')">Costa Rica</a>
        <a onclick="filterObjects('all')">Show All</a>
      </div>
    </div>

    <div class="dropdown">
      <button class="dropbtn">Brand</button>
      <div class="dropdown-content">
        <a onclick="filterObjects('dole')">Dole</a>
        <a onclick="filterObjects('chiquita')">Chiquita</a>
        <a onclick="filterObjects('mike')">Mike's Melons</a>
        <a onclick="filterObjects('slimcado')">Slimcado</a>
        <a onclick="filterObjects('all')">Show All</a>
      </div>
    </div>

  </div>

  <div class="stickers">

    <a class="box orange usa show randomImage" href="stickers/double-happiness.html">
      <img src="assets/1 - DoubleHappiness.png">
    </a>

    <a class="box citrus usa show randomImage" href="stickers/halos.html">
      <img src="assets/1 - Halos.png">
    </a>

    <a class="box citrus mexico show randomImage" href="stickers/jaffa.html">
      <img src="assets/1 - Jaffa Red Pomelo- Palestinian Colors.png">
    </a>

    <a class="box citrus usa show randomImage" href="stickers/jaffa-sweetie.html">
      <img src="assets/1 - Jaffa Sweetie.png">
    </a>

    <a class="box melon usa mike show randomImage" href="stickers/mikes-melons.html">
      <img src="assets/1 - Mike's Melons.png">
    </a>

    <a class="box avocado mexico show randomImage" href="stickers/slimcado.html">
      <img src="assets/1 - SlimCado.png">
    </a>

    <a class="box banana mexico chiquita show randomImage" href="stickers/chiquita.html">
      <img src="assets/1- CHIQUITA STICKER.png">
    </a>

    <a class="box watermelon mexico borders melon show randomImage" href="stickers/borders.html">
      <img src="fruitstickersmall/1.png">
    </a>

    <a class="box coconut costa rica tica show randomImage" href="stickers/tica.html">
      <img src="fruitstickersmall/3.png">
    </a>

    <a class="box watermelon mexico tica show randomImage" href="stickers/amaris.html">
      <img src="fruitstickersmall/5.png">
    </a>

  </div>

  <script>
    filterObjects("all");

    function filterObjects(c) {
      var x = document.getElementsByClassName("box");
      if (c == "all") c = "";
      for (let i = 0; i < x.length; i++) {
        x[i].classList.remove("show");
        if (x[i].className.indexOf(c) > -1) {
          x[i].classList.add("show");
        }
      }
    }

    function moveImage() {
      const container = document.querySelector(".stickers");
      const stickers = document.querySelectorAll(".randomImage");
      const placed = [];

      stickers.forEach(function (sticker) {

        let x, y, overlap = true;

        while (overlap) {

          x = Math.random() * (container.clientWidth - 120);
          y = Math.random() * (container.clientHeight - 120);

          overlap = false;

          for (let i = 0; i < placed.length; i++) {
            let dx = Math.abs(x - placed[i].x);
            let dy = Math.abs(y - placed[i].y);

            if (dx < 120 && dy < 120) {
              overlap = true;
              break;
            }
          }
        }

        sticker.style.left = x + "px";
        sticker.style.top = y + "px";

        let rotation = Math.random() * 60 - 30;
        sticker.style.transform = "rotate(" + rotation + "deg)";

        placed.push({ x: x, y: y });
      });
    }

    window.addEventListener("load", () => {
      if (window.innerWidth > 600) {
        setTimeout(moveImage, 100); 
      }
    });
  </script>

</body>

</html>
