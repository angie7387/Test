<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Fruit Sticker Archive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

  <style>
    * {
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      padding: 15px;
      width: 100%;
      border-bottom: 1px solid black;
      font-size: 13pt;
      align-items: center;
      background-color: white;
    }

    header a {
      justify-self: end;
    }

    body {
        overflow-x: hidden;
    }

    .box {
      display: none;
    }

    .show {
      display: block;
    }

    img {
      max-width: 100%;
      height: auto;
      /* filter: drop-shadow(1px 3px 4px #00000078); */
    }

    .dropdown-container {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      padding: 10px;
    }

    .dropbtn {
      border: 1px solid black;
      background-color: white;
      padding: 5px;
      cursor: pointer;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: white;
      min-width: 100px;
      z-index: 1;
    }

    .dropdown-content a {
      padding: 10px;
      display: block;
      cursor: pointer;
    }

    .dropdown-content a:hover {
      background-color: #e7e7e7;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .arrow-down {
      display: inline;
      margin-bottom: 20x;
    }

    @media screen and (max-width: 600px) {
      .stickers {
        grid-template-columns: 1fr;
      }
    }


    .stickers {
      position: relative;
      width: 100%;
      min-height: 80vh;
    }

    .randomImage {
      position: absolute;
      z-index: 2;
    }

    .randomImage img {
      max-height: 200px;
    }

    .randomImage:hover {
      transform: rotate(0deg) scale(1.05) !important;
      transition: 0.25s ease-in-out;
    }


  </style>

  <header>
    <div>Fruit Sticker Archive</div>
    <a href="about/about.html">About</a>
  </header>

  <div class="dropdown-container">

    <div class="dropdown">
      <button class="dropbtn">
        <span class="label">Fruit Kind</span>
        <span class="arrow-down">⌄</span>
      </button>

      <div class="dropdown-content">
        <a onclick="filterObjects('avocado')">Avocado</a>
        <a onclick="filterObjects('banana')">Banana</a>
        <a onclick="filterObjects('citrus')">Citrus</a>
        <a onclick="filterObjects('all')">Show All</a>
      </div>
    </div>

    <div class="dropdown">
      <button class="dropbtn">Country ⌄</button>
      <div class="dropdown-content">
        <a onclick="filterObjects('canada')">Canada</a>
        <a onclick="filterObjects('mexico')">Mexico</a>
        <a onclick="filterObjects('usa')">USA</a>
        <a onclick="filterObjects('all')">Show All</a>

      </div>
    </div>

    <div class="dropdown">
      <button class="dropbtn">Brand ⌄</button>
      <div class="dropdown-content">
        <a onclick="filterObjects('dole')">Dole</a>
        <a onclick="filterObjects('chiquita')">Chiquita</a>
        <a onclick="filterObjects('all')">Show All</a>

      </div>
    </div>

  </div>

  <div class="stickers">

    <a class="box orange usa show randomImage" href="stickers/double-happiness.html">
      <img src="assets/1 - DoubleHappiness.png">
    </a>

    <a class="box citrus usa show randomImage" href="stickers/halos.html">
      <img src="assets/1 - Halos.png">
    </a>

    <a class="box citrus mexico show randomImage  " href="stickers/jaffa.html">
      <img src="assets/1 - Jaffa Red Pomelo- Palestinian Colors.png">
    </a>

    <a class="box citrus usa show randomImage" href="stickers/jaffa-sweetie.html">
      <img src="assets/1 - Jaffa Sweetie.png">
    </a>

    <a class="box melon usa show randomImage" href="stickers/mikes-melons.html">
      <img src="assets/1 - Mike's Melons.png">
    </a>

    <a class="box avocado mexico show randomImage " href="stickers/slimcado.html">
      <img src="assets/1 - SlimCado.png">
    </a>

    <a class="box banana mexico chiquita show randomImage " href="stickers/chiquita.html">
      <img src="assets/1- CHIQUITA STICKER.png">
    </a>
      <a class="box watermelon mexico borders melon show randomImage" href="stickers/borders.html">
        <img src="assets/1.png">
      </a>

        <div class="box watermelon mexico borders melon show randomImage ">
          <img src="assets/2.png">
        </a>

  </div>
  <script>
    filterObjects("all");


    function filterObjects(c) {
      var x, i;
      x = document.getElementsByClassName("box");
      if (c == "all") c = "";
      for (i = 0; i < x.length; i++) {
        removeClass(x[i], "show");
        if (x[i].className.indexOf(c) > -1) addClass(x[i], "show");
      }
    }

    function addClass(element, name) {
      var i, arr1, arr2;
      arr1 = element.className.split(" ");
      arr2 = name.split(" ");
      for (i = 0; i < arr2.length; i++) {
        if (arr1.indexOf(arr2[i]) == -1) {
          element.className += " " + arr2[i];
        }
      }
    }

    function removeClass(element, name) {
      var i, arr1, arr2;
      arr1 = element.className.split(" ");
      arr2 = name.split(" ");
      for (i = 0; i < arr2.length; i++) {
        while (arr1.indexOf(arr2[i]) > -1) {
          arr1.splice(arr1.indexOf(arr2[i]), 1);
        }
      }
      element.className = arr1.join(" ");
    }

    //Random placement
    function moveImage() {

      // get the sticker area
      const container = document.querySelector(".stickers");

      // get all stickers
      const stickers = document.querySelectorAll(".randomImage");

      // store positions of stickers we already placed
      const placed = [];

      stickers.forEach(function (sticker) {

        let x;
        let y;
        let overlap = true;

        // keep trying positions until we find one that doesn't overlap
        while (overlap) {

          x = Math.random() * (container.clientWidth - 120);
          y = Math.random() * (container.clientHeight - 120);

          overlap = false;

          // check against previously placed stickers
          for (let i = 0; i < placed.length; i++) {

            let dx = Math.abs(x - placed[i].x);
            let dy = Math.abs(y - placed[i].y);

            if (dx < 120 && dy < 120) {
              overlap = true;
              break;
            }

          }

        }

        // place the sticker
        sticker.style.left = x + "px";
        sticker.style.top = y + "px";

        // random rotation
        let rotation = Math.random() * 60 - 30;
        sticker.style.transform = "rotate(" + rotation + "deg)";

        // remember this sticker's position
        placed.push({ x: x, y: y });

      });

    }

  window.addEventListener("load", () => {
    setTimeout(moveImage, 100);
  });
  </script>

</body>

</html>
